# Blueprint de Render para el backend de Lince.
# Render → New → Blueprint → seleccionar este repo.
# Las claves marcadas sync:false se cargan a mano en el panel (son secretas).
services:
  - type: web
    name: lince-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

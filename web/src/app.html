<!doctype html>
<html lang="es">
	<head>
		<!-- Marca que hay JS antes de pintar: las animaciones de scroll solo ocultan
		     contenido si esta clase está presente (sin JS, todo se ve igual).
		     Además aplica tema (claro/oscuro) e idioma ANTES del primer pintado,
		     leyendo la preferencia guardada, para evitar el flash al recargar. -->
		<script>
			(function () {
				var el = document.documentElement;
				el.classList.add('js');
				try {
					var theme = localStorage.getItem('lince-theme');
					if (!theme) {
						theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}
					el.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');

					var locale = localStorage.getItem('lince-locale');
					if (locale === 'en' || locale === 'es') el.setAttribute('lang', locale);
				} catch (e) {
					/* almacenamiento bloqueado: se usa el tema/idioma por defecto */
				}
			})();
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/favicon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

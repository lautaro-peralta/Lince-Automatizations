<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Lince Teams — Lince Automate</title>
<meta name="description" content="Lince Teams — el espacio de trabajo interno del equipo: tablero kanban, pizarra colaborativa y panel de actividad, con el mismo login del panel de Lince." />

<!-- Tema antes del primer pintado (mismo mecanismo y clave que el sitio y el Startup OS: lince-theme). -->
<script>
	(function () {
		try {
			var saved = localStorage.getItem('lince-theme');
			var theme =
				saved === 'dark' || saved === 'light'
					? saved
					: matchMedia('(prefers-color-scheme: dark)').matches
						? 'dark'
						: 'light';
			document.documentElement.setAttribute('data-theme', theme);
		} catch (e) {
			/* sin storage: queda el tema claro */
		}
	})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
	href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap"
	rel="stylesheet"
/>
<link rel="stylesheet" href="/teams/styles.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231B2B23'/><text x='16' y='23' font-family='Georgia' font-size='19' fill='%23F7F5F0' text-anchor='middle'>L</text></svg>" />
</head>
<body>

<!-- Íconos SVG reutilizables (tema claro/oscuro). -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
	<symbol id="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></symbol>
	<symbol id="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></symbol>
</svg>

<!-- Splash / redirección: mientras se resuelve la sesión compartida con /admin. -->
<div id="gate" class="gate">
	<div>
		<div class="gate-brand">Lince <em>Teams</em></div>
		<div class="gate-sub" id="gate-sub">Comprobando tu sesión…</div>
		<a class="gate-link" id="gate-login-link" href="/admin" hidden>Ir a iniciar sesión</a>
	</div>
</div>

<div id="app" class="app" hidden>
	<header class="masthead">
		<div class="brand">Lince <em>Teams</em></div>
		<nav class="tabs mast-nav" role="tablist">
			<button class="tab nav-item active" role="tab" data-view="dashboard">Panel</button>
			<button class="tab nav-item" role="tab" data-view="board">Tablero</button>
			<button class="tab nav-item" role="tab" data-view="whiteboard">Pizarra</button>
		</nav>
		<div class="mast-user">
			<a class="startup-link" href="/startup-os/" title="Startup OS">Startup OS ↗</a>
			<a class="startup-link" id="go-admin-link" href="/admin" title="Panel de administración" hidden>Panel ↗</a>
			<button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
				<svg class="theme-ico" aria-hidden="true"><use href="#i-moon" /></svg>
			</button>
			<span class="avatar js-avatar" id="me-avatar"></span>
			<span class="user-name" id="me-name"></span>
			<button id="btn-logout" class="btn-ghost btn-small">Salir</button>
		</div>
	</header>
	<main id="main" class="main"></main>
</div>

<div id="modal-root"></div>
<div id="toast-root" class="toast-root"></div>

<!-- supabase-js vendoreado (mismo origen): sin CDN de terceros en producción. -->
<script src="/teams/vendor/supabase-js-2.108.2.js"></script>
<script type="module" src="/teams/app.js"></script>
</body>
</html>

# Compila el APK de la app móvil Lince (mobile/, Capacitor) y lo publica como
# artifact del run. Uso interno: el APK se instala directo en Android
# (sideload); ver mobile/README.md.
name: Mobile Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'URL del servidor (vacío = producción lince-automate.com.ar)'
        required: false
        default: ''
  push:
    branches: [main]
    paths: ['mobile/**']

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Sincronizar Capacitor
        env:
          CAP_SERVER_URL: ${{ github.event.inputs.server_url }}
        run: npx cap sync android

      - name: Compilar APK firmado
        working-directory: mobile/android
        env:
          # Sin secrets se usa el keystore interno commiteado (misma firma →
          # las actualizaciones instalan encima). Para una firma propia,
          # definir estos cuatro secrets en el repo.
          LINCE_KEYSTORE_FILE: ${{ secrets.LINCE_KEYSTORE_FILE }}
          LINCE_KEYSTORE_PASSWORD: ${{ secrets.LINCE_KEYSTORE_PASSWORD }}
          LINCE_KEYSTORE_ALIAS: ${{ secrets.LINCE_KEYSTORE_ALIAS }}
          LINCE_KEYSTORE_KEY_PASSWORD: ${{ secrets.LINCE_KEYSTORE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PcmdVersionCode=${{ github.run_number }} --no-daemon

      - name: Verificar firma
        working-directory: mobile/android
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: lince-app-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

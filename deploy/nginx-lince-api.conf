# Reverse proxy de nginx para el backend de Lince.
# Reemplazá api.TU-DOMINIO.com por tu subdominio real ANTES de usarlo.
#
# Instalar en la VM:
#   sudo cp /opt/lince/deploy/nginx-lince-api.conf /etc/nginx/sites-available/lince-api
#   sudo ln -s /etc/nginx/sites-available/lince-api /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.TU-DOMINIO.com   # agrega el bloque 443 + TLS solo

server {
    listen 80;
    server_name api.TU-DOMINIO.com;

    # Los comprobantes pesan hasta 8 MB (multer). El default de nginx es 1 MB,
    # así que hay que subirlo o las subidas fallan con 413.
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
